function filterInvSnap() {
  const sku    = document.getElementById('is-f-sku')?.value    || '';
  const loc    = document.getElementById('is-f-loc')?.value    || '';
  const zone   = document.getElementById('is-f-zone')?.value   || '';
  const cat    = document.getElementById('is-f-cat')?.value    || '';
  const status = document.getElementById('is-f-status')?.value || '';
  let rows = _invSnap.filter(r => {
    if(sku    && r.sku           !== sku)    return false;
    if(loc    && r.location_code !== loc)    return false;
    if(zone   && r.zone          !== zone)   return false;
    if(cat    && r.category      !== cat)    return false;
    if(status && r.stock_status  !== status) return false;
    return true;
  });
  const body = document.getElementById('is-body');
  if(!body) return;
  if(!rows.length) {
    body.innerHTML=`<div class="empty-state"><div class="icon">📸</div><p>No inventory records match the filters</p></div>`;
    return;
  }
  const totalQty   = rows.reduce((s,r)=>s+(r.on_hand_qty||0),0);
  const totalVal   = rows.reduce((s,r)=>s+(r.stock_value||0),0);
  const inStock    = rows.filter(r=>r.stock_status==='IN_STOCK').length;
  const belowRO    = rows.filter(r=>r.stock_status==='BELOW_REORDER').length;
  const outOfStock = rows.filter(r=>r.stock_status==='OUT_OF_STOCK').length;
  const uniqueItems= new Set(rows.map(r=>r.sku)).size;

  body.innerHTML=`
    <div class="rpt-kpi-band">
      <div class="rpt-kpi blue"><div class="rpt-kpi-label">Total Lines</div><div class="rpt-kpi-value">${rows.length}</div><div class="rpt-kpi-sub">${uniqueItems} unique SKUs</div></div>
      <div class="rpt-kpi green"><div class="rpt-kpi-label">Total On Hand</div><div class="rpt-kpi-value">${totalQty.toLocaleString()}</div><div class="rpt-kpi-sub">Across all locations</div></div>
      <div class="rpt-kpi teal"><div class="rpt-kpi-label">Total Stock Value</div><div class="rpt-kpi-value" style="font-size:16px">$${totalVal.toFixed(2)}</div><div class="rpt-kpi-sub">At unit cost</div></div>
      <div class="rpt-kpi green"><div class="rpt-kpi-label">In Stock</div><div class="rpt-kpi-value" style="color:#4ade80">${inStock}</div><div class="rpt-kpi-sub">Above reorder point</div></div>
      <div class="rpt-kpi orange"><div class="rpt-kpi-label">Below Reorder</div><div class="rpt-kpi-value" style="color:#fbbf24">${belowRO}</div><div class="rpt-kpi-sub">Action required</div></div>
      <div class="rpt-kpi red"><div class="rpt-kpi-label">Out of Stock</div><div class="rpt-kpi-value" style="color:#f87171">${outOfStock}</div><div class="rpt-kpi-sub">Zero quantity</div></div>
    </div>
    <div class="rpt-section-hd">
      <span class="rpt-section-title">On-Hand Inventory Detail</span>
      <span class="rpt-section-count">${rows.length} line(s)</span>
    </div>
    <div class="rpt-table-wrap">
      <table class="rpt-table">
        <thead><tr>
          <th>#</th><th>Item SKU</th><th>Item Description</th><th>Category</th>
          <th>UoM</th><th>Location</th><th>Zone</th><th>Supplier</th>
          <th style="text-align:right">On Hand Qty</th>
          <th style="text-align:right">Reorder Pt</th>
          <th style="text-align:right">Unit Cost</th>
          <th style="text-align:right">Stock Value</th>
          <th>Stock Status</th>
          <th>Last Updated</th>
        </tr></thead>
        <tbody>
        ${rows.map((r,i)=>`<tr>
          <td style="color:var(--text3);font-family:monospace;font-size:10px">${i+1}</td>
          <td><strong style="color:var(--accent);font-family:monospace;font-size:11px">${r.sku}</strong></td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.item_name||''}">${r.item_name||'—'}</td>
          <td style="font-size:11px">${r.category||'—'}</td>
          <td style="font-family:monospace;font-size:11px">${r.uom||'—'}</td>
          <td><code style="background:rgba(255,255,255,.04);padding:2px 5px;border-radius:3px;font-size:10px;color:var(--accent5)">${r.location_code||'—'}</code></td>
          <td style="font-size:11px">${r.zone||'—'}</td>
          <td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.supplier_name||'—'}</td>
          <td style="text-align:right;font-family:monospace;font-weight:700">${r.on_hand_qty??'—'}</td>
          <td style="text-align:right;font-family:monospace;color:var(--text3)">${r.reorder_point||0}</td>
          <td style="text-align:right;font-family:monospace;font-size:11px">$${(r.unit_cost||0).toFixed(2)}</td>
          <td style="text-align:right;font-family:monospace;font-weight:700;color:var(--accent3)">$${(r.stock_value||0).toFixed(2)}</td>
          <td><span class="stock-${r.stock_status}">${(r.stock_status||'—').replace(/_/g,' ')}</span></td>
          <td style="font-size:10px;color:var(--text3);font-family:monospace;white-space:nowrap">${(r.last_updated||'—').replace('T',' ').split('.')[0]}</td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="rpt-footer">
      <span>Report: INV-SNAP-001 &nbsp;|&nbsp; As-of: ${new Date().toLocaleString()}</span>
      <span>${rows.length} lines &nbsp;|&nbsp; Total Qty: ${totalQty} &nbsp;|&nbsp; Total Value: $${totalVal.toFixed(2)}</span>
      <span>My Warehouse Management · WMS-001</span>
    </div>`;
}

function exportInvSnapCSV() {
  const rows = _invSnap;
  const headers=['SKU','ITEM_NAME','CATEGORY','UOM','LOCATION','ZONE','SUPPLIER',
                 'ON_HAND_QTY','REORDER_POINT','UNIT_COST','STOCK_VALUE','STOCK_STATUS','LAST_UPDATED'];
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[headers.join(','),
    ...rows.map(r=>[r.sku,r.item_name,r.category,r.uom,r.location_code,r.zone,r.supplier_name,
      r.on_hand_qty,r.reorder_point,r.unit_cost,r.stock_value,r.stock_status,r.last_updated
    ].map(esc).join(','))
  ].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`INV-SNAP-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  toast('CSV exported','success');
}

        <thead><tr><th>Role</th><th>Capabilities</th><th>Restrictions</th></tr></thead>
        <tbody>
          <tr><td><strong>Operator</strong></td><td>View all screens, create inbound/outbound, view reports</td><td>Cannot manage users or run utilities</td></tr>
          <tr><td><strong>Manager</strong></td><td>All operator capabilities + edit master data</td><td>Cannot manage users</td></tr>
          <tr><td><strong>Admin</strong></td><td>Full access including users and utilities</td><td>None</td></tr>
        </tbody>
      </table>
    </div>
    <div class="hm-section" id="hm-tips">
      <div class="hm-h1">11. Tips &amp; Best Practices</div>
      <ul class="hm-ul">
        <li>Set the correct <strong>Status</strong> on orders — inventory only updates on <strong>Completed</strong>.</li>
        <li>Set a <strong>Reorder Point</strong> on each item to receive Low Stock alerts.</li>
        <li>Run a <strong>Backup</strong> before bulk changes to master data.</li>
        <li>Use <strong>Export CSV</strong> in reports for further spreadsheet analysis.</li>
        <li>Always <strong>Log Out</strong> when leaving your workstation.</li>
      </ul>
    </div>
    <div class="hm-section" id="hm-glossary">
      <div class="hm-h1">12. Glossary</div>
      <table class="hm-table">
        <thead><tr><th>Term</th><th>Definition</th></tr></thead>
        <tbody>
          <tr><td>SKU</td><td>Stock Keeping Unit — unique code identifying a specific item</td></tr>
          <tr><td>UoM</td><td>Unit of Measure — how an item quantity is counted (EA, KG, PCS)</td></tr>
          <tr><td>Inbound</td><td>Goods received into the warehouse from a supplier</td></tr>
          <tr><td>Outbound</td><td>Goods dispatched from the warehouse to a customer or destination</td></tr>
          <tr><td>On Hand Qty</td><td>Current physical quantity of an item at a specific location</td></tr>
          <tr><td>Reorder Point</td><td>Minimum stock level that triggers a Low Stock alert</td></tr>
          <tr><td>Snapshot</td><td>Point-in-time view of current inventory quantities</td></tr>
          <tr><td>KPI</td><td>Key Performance Indicator — a measurable metric on the dashboard</td></tr>
          <tr><td>WMS</td><td>Warehouse Management System</td></tr>
          <tr><td>Backup</td><td>A saved copy of the database for disaster recovery</td></tr>
        </tbody>
      </table>
    </div>
    <div style="text-align:center;padding:24px 0 8px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);margin-top:24px">
      My Warehouse Management System &nbsp;·&nbsp; User Manual v1.0 &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; WMS-001
    </div>`;
